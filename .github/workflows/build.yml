name: Build Extensions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-chrome-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm compile

      - name: Lint
        run: pnpm lint

      - name: Build and zip for Chrome
        run: pnpm zip

      - name: Build and zip for Firefox
        run: pnpm zip:firefox

      - name: Rename zips with consistent names
        run: |
          cp .output/*-chrome.zip .output/kawakumo-chrome.zip
          cp .output/*-firefox.zip .output/kawakumo-firefox.zip

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: .output/kawakumo-chrome.zip

      - name: Upload Firefox extension
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: .output/kawakumo-firefox.zip

  build-safari:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build for Safari
        run: pnpm build:safari

      - name: Convert to Safari extension Xcode project
        run: |
          xcrun safari-web-extension-converter .output/safari-mv2 \
            --project-location .output/safari-xcode \
            --app-name "Kawakumo" \
            --bundle-identifier com.kawakumo.extension \
            --no-open \
            --no-prompt \
            --force

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build Safari app with Xcode
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project ".output/safari-xcode/Kawakumo/Kawakumo.xcodeproj" \
            -scheme "Kawakumo (macOS)" \
            -configuration Release \
            -derivedDataPath .output/safari-build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE="Manual" \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Notarize Safari app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=".output/safari-build/Build/Products/Release/Kawakumo.app"
          ZIP_PATH="$RUNNER_TEMP/Kawakumo-notarize.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package Safari extension
        run: |
          cd .output/safari-build/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/.output/kawakumo-safari.zip" "Kawakumo.app"

      - name: Upload Safari extension
        uses: actions/upload-artifact@v4
        with:
          name: safari-extension
          path: .output/kawakumo-safari.zip

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-chrome-firefox, build-safari]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version from package.json
        id: version
        run: echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Kawakumo ${{ steps.version.outputs.version }}
          make_latest: true
          body: |
            Automated build from commit ${{ github.sha }}.

            **Downloads:**
            - `kawakumo-chrome.zip` — Chrome / Chromium browsers
            - `kawakumo-firefox.zip` — Firefox
            - `kawakumo-safari.zip` — Safari (macOS)
          files: |
            artifacts/chrome-extension/kawakumo-chrome.zip
            artifacts/firefox-extension/kawakumo-firefox.zip
            artifacts/safari-extension/kawakumo-safari.zip
